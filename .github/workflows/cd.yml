name: CD

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image-tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency: deploy-main
    steps:
      - uses: actions/checkout@v4

      - uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - uses: azure/k8s-deploy@v5
        with:
          namespace: kube-news
          manifests: k8s/
          images: fabricioveronez/evento-kube-news:${{ inputs.image-tag }}
